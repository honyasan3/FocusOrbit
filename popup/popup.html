<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FocusOrbit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { width: 260px; } </style>
</head>
<body class="bg-gray-50 p-4 font-sans text-gray-800">
    <h1 class="text-lg font-bold border-b pb-2 mb-3 text-blue-600 flex items-center justify-between">
        FocusOrbit
        <a href="#" id="optionsBtn" class="text-xs text-gray-400 hover:text-gray-600">設定</a>
    </h1>
    
    <div id="ctxList" class="space-y-2 mb-4"></div>

    <div class="flex gap-2">
        <input type="text" id="newCtxName" placeholder="新しいグループ名" class="flex-1 px-2 py-1 text-sm border rounded focus:outline-none focus:border-blue-500">
        <button id="addCtxBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-sm font-medium transition">+</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
